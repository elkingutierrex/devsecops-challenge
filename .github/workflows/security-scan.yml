name: Security Scan (Trivy)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Hardened Image
        run: |
          docker build -t catalog-microservice:hardened \
            -f src/microservices/CatalogMicroservice/Dockerfile.hardened .

      - name: Run Trivy vulnerability scanner (Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'catalog-microservice:hardened'
          format: 'table'
          exit-code: '1' # Falla el build si hay hallazgos
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy scanner (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'src/microservices/CatalogMicroservice/'
          format: 'table'
          severity: 'CRITICAL,HIGH'
